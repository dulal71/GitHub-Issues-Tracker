<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- tailwind + daisy ui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<!-- style css -->
<link rel="stylesheet" href="style.css">
</head>
<body >
    <main>
        <section id="login" class="max-w-lg bg-white mx-auto my-0 p-4 md:my-20 md:p-8 shadow-md space-y-6 ">
<div class="text-center space-y-1">
    <img class="mx-auto mb-4" src="assets/github-logo.png" alt="github-logo">
    <h1 class="font-bold text-2xl">GitHub Issues Tracker</h1>
    <p class="text-gray-500">Sign in to manage your issues</p>
</div>

<div>
    <fieldset class="fieldset">
  <label class=" text-xl font-bold">Username</label>
  <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
<label class="text-xl font-bold">Password</label>
  <input id="login-password" type="password" class="input w-full" placeholder="Password" />
<button id="login-btn" class="btn btn-primary mt-4">Login</button>
</fieldset>
</div>
</section>
    </main>
<script src="script/script.js"></script>
</body>
</html>
