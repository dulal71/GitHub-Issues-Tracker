<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- tailwind + daisy ui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- font awesome -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

 <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<!-- style css -->
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
   <div class="navbar flex-col md:flex-row justify-between bg-base-100 shadow-sm py-4 px-2  md:px-20">
  <div class="flex flex-col md:flex-row justify-center items-center space-x-2">
   <img class="max-w-14" src="assets/github-logo.png" alt="">
   <h1 class="font-bold text-2xl">GitHub Issues Tracker</h1>
  </div>
  <div class="flex gap-2">
  <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input id="search-keyword" type="search" required placeholder="Search issues" />
</label>
   <button id="search-btn" onclick="showSearchIssue()" class="btn btn-primary">+ New Issue</button>
  </div>
</div> 
</header>
<main>
  
  <!-- All button -->
  <section class="bg-white max-w-11/12 shadow-sm mx-auto mt-10 p-6">
    <div class=" flex gap-4">
<button id="all-btn" onclick="showAllIssue()" class="btn">All</button>
<button id="open-btn" onclick="showOpenIssue()" class="btn">Open</button>
<button id="closed-btn" onclick="showClosedIssue()" class="btn">Closed</button>
    </div>
  </section>
<!-- total count -->
<section class="bg-white space-y-4 md:space-y-0 max-w-11/12 flex flex-col md:flex-row justify-between shadow-sm mx-auto my-10 p-6">
  <div class="left-content  flex flex-row gap-4 justify-center items-center">
    <div class=" p-3 rounded-full bg-purple-100 flex justify-center items-center">
      <img src="assets/Aperture.png" alt="">
    </div>
<div>
 <h2 class="font-bold text-xl"><span id="total-issue">0</span> Issues</h2> 
 <p class="text-gray-500">Track and manage your project issues</p>
</div>
  </div>
  <div class="rigth-content space-x-2"> 
    <span class="text-green-600"><i class="fa-solid fa-circle"></i>Open</span>
  <span class="text-purple-500"><i class="fa-solid fa-circle"></i>Closed</span>
</div>
 </section>

 <!-- spinner -->
<section id="spinner" class="max-w-11/12 text-center mx-auto my-10 p-6 hidden">
   <!-- Open the modal using ID.showModal() method -->
 <span class="loading loading-dots loading-xl"></span>
  </section>
  <!-- all tab -->
<section id="all-tab">
 <!-- showAll card -->
 <section id="allCard-container" class="bg-white max-w-11/12 mx-auto shadow-md p-5 grid grid-cols-1 md:grid-cols-2 lg:md:grid-cols-4 gap-5">
</section>
<!-- show open card -->
 <section id="openCard-container" class="bg-white max-w-11/12 mx-auto shadow-md p-5 grid grid-cols-1 md:grid-cols-2 lg:md:grid-cols-4 gap-5 hidden">
 </section>
<!-- show closed card -->
 <section id="closedCard-container" class="bg-white max-w-11/12 mx-auto shadow-md p-5 grid grid-cols-1 md:grid-cols-2 lg:md:grid-cols-4 gap-5 hidden">
 </section>
<!-- search card -->
<section id="search-issue" class="bg-white max-w-11/12 mx-auto shadow-md p-5 grid grid-cols-1 md:grid-cols-2 lg:md:grid-cols-4 gap-5">
</section>
<!-- modal -->
<section>
  <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
   <div id="modal-content">

   </div>
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>
</section>
</section>
</main>


<script src="script/home.js"></script>
</body>
</html>
